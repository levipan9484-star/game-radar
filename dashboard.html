<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Radar — 市场异动</title>

<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --border: rgba(0,0,0,0.06);
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #0071e3;
  --red: #ff3b30;
  --orange: #ff9500;
  --yellow: #ffcc00;
  --green: #34c759;
  --purple: #af52de;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 100;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.header .meta {
  font-size: 12px;
  color: var(--text-secondary);
}

.summary-bar {
  display: flex;
  gap: 12px;
  padding: 20px 40px;
  flex-wrap: wrap;
}
.summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 24px;
  min-width: 130px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: transform 0.2s, box-shadow 0.2s;
}
.summary-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.summary-card .number { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
.summary-card .label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.critical .number { color: var(--red); }
.high .number { color: var(--orange); }
.medium .number { color: #e6a700; }
.low .number { color: var(--green); }
.total .number { color: var(--accent); }
.excluded .number { color: var(--text-tertiary); }

.main-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 0 40px 20px;
  max-width: 1600px;
  margin: 0 auto;
}
.chart-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.chart-panel h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.full-width { grid-column: 1 / -1; }

.game-table-wrap {
  grid-column: 1 / -1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}
.game-table-wrap > h3 {
  font-size: 16px; font-weight: 700; margin-bottom: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.game-table-wrap > h3 span { font-size: 12px; color: var(--text-tertiary); font-weight: 400; }

.filter-bar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.filter-btn {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

.search-box {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-primary);
  font-size: 14px;
  width: 280px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12); }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 12px;
  color: var(--text-tertiary); font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { color: var(--accent); }
th.sorted-asc::after { content: ' ▲'; color: var(--accent); }
th.sorted-desc::after { content: ' ▼'; color: var(--accent); }

td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.03); vertical-align: middle; }
tr:hover td { background: rgba(0,113,227,0.02); }

.priority-badge {
  display: inline-block; padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
}
.priority-CRITICAL { background: rgba(255,59,48,0.1); color: var(--red); }
.priority-HIGH { background: rgba(255,149,0,0.1); color: var(--orange); }
.priority-MEDIUM { background: rgba(255,204,0,0.12); color: #b38600; }
.priority-LOW { background: rgba(52,199,89,0.1); color: #28a745; }

.freshness-tag {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 600; margin-left: 6px;
}
.fresh-launch { background: rgba(255,59,48,0.08); color: var(--red); }
.fresh-new { background: rgba(0,113,227,0.08); color: var(--accent); }
.fresh-recent { background: rgba(175,82,222,0.08); color: var(--purple); }
.fresh-evergreen { background: rgba(142,142,147,0.1); color: var(--text-secondary); }
.fresh-upcoming { background: rgba(255,149,0,0.08); color: var(--orange); }

.score-bar { display: inline-flex; align-items: center; gap: 8px; }
.score-bar .bar { width: 60px; height: 5px; background: rgba(0,0,0,0.06); border-radius: 3px; overflow: hidden; }
.score-bar .bar-fill { height: 100%; border-radius: 3px; }

.signal-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.signal-tag {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  font-size: 11px; background: rgba(0,113,227,0.06); color: var(--accent);
}

.game-name { font-weight: 600; color: var(--text-primary); }
.game-dev { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

.ea-badge {
  display: inline-block; padding: 2px 6px; border-radius: 4px;
  font-size: 10px; font-weight: 700;
  background: rgba(175,82,222,0.08); color: var(--purple);
  margin-left: 6px;
}

.expand-row td {
  padding: 16px 20px; background: var(--bg); border: none;
}
.expand-content {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.signal-detail {
  background: var(--card); padding: 14px; border-radius: 10px;
  border: 1px solid var(--border);
}
.signal-detail h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.action-text {
  padding: 14px; background: var(--card); border-radius: 10px;
  border-left: 3px solid var(--accent); font-size: 13px;
  line-height: 1.8; white-space: pre-wrap; grid-column: 1 / -1;
}

@media (max-width: 1200px) { .main-content { grid-template-columns: 1fr; } }
@media (max-width: 768px) {
  .header, .summary-bar, .main-content { padding-left: 16px; padding-right: 16px; }
  .search-box { width: 100%; }
}
</style>
</head>

let currentFilter = 'all', currentSearch = '', currentSort = {key:'score',dir:'desc'};

function renderCharts() {
  const pColors = {'CRITICAL':'#ff3b30','HIGH':'#ff9500','MEDIUM':'#e6a700','LOW':'#34c759'};
  const scatterData = allGames.filter(g => !g.excluded && g.score > 0);
  const traces = ['CRITICAL','HIGH','MEDIUM','LOW'].map(p => {
    const f = scatterData.filter(d => d.priority === p);
    return {
      x: f.map(d => d.snapshot?.pcu || 1),
      y: f.map(d => d.score),
      text: f.map(d => `<b>${d.name}</b><br>PCU: ${(d.snapshot?.pcu||0).toLocaleString()}<br>Score: ${d.score}<br>Twitch: ${(d.snapshot?.twitch_viewers||0).toLocaleString()}<br>${d.snapshot?.freshness||''}`),
      marker: {
        size: f.map(d => Math.max(8, Math.min(45, Math.sqrt(d.snapshot?.twitch_viewers||0)/4))),
        color: pColors[p], opacity: 0.75,
        line: {color:'rgba(255,255,255,0.8)',width:1.5},
      },
      name: p, type:'scatter', mode:'markers',
      hovertemplate: '%{text}<extra></extra>',
    };
  });
  Plotly.newPlot('scatterChart', traces, {
    paper_bgcolor:'transparent', plot_bgcolor:'transparent',
    margin:{l:50,r:20,t:10,b:50},
    xaxis:{title:'PCU',color:'#86868b',gridcolor:'rgba(0,0,0,0.04)',type:'log',zeroline:false},
    yaxis:{title:'评分',color:'#86868b',gridcolor:'rgba(0,0,0,0.04)',range:[0,105],zeroline:false},
    showlegend:true,
    legend:{x:0.01,y:0.99,bgcolor:'rgba(255,255,255,0.8)',font:{color:'#86868b',size:11}},
    font:{family:'-apple-system,sans-serif'}, height:300,
  }, {responsive:true, displayModeBar:false});

  const pCounts = {};
  scatterData.forEach(g => { pCounts[g.priority] = (pCounts[g.priority]||0)+1; });
  const freshCounts = {};
  scatterData.forEach(g => {
    const f = g.snapshot?.freshness || '未知';
    freshCounts[f] = (freshCounts[f]||0)+1;
  });
  const fLabels = Object.keys(freshCounts);
  const fValues = Object.values(freshCounts);
  Plotly.newPlot('distributionChart', [{
    labels: fLabels, values: fValues, type:'pie', hole:0.5,
    marker:{colors:fLabels.map(l => l.includes('首周')?'#ff3b30':l.includes('新品')?'#0071e3':l.includes('近期')?'#af52de':l.includes('翻红')?'#ff9500':'#86868b')},
    textinfo:'value+label', textfont:{size:11,color:'#1d1d1f'},
  }], {
    paper_bgcolor:'transparent', plot_bgcolor:'transparent',
    margin:{l:20,r:20,t:10,b:20}, showlegend:false,
    font:{family:'-apple-system,sans-serif'}, height:300,
  }, {responsive:true, displayModeBar:false});
}

function renderTable() {
  const tbody = document.getElementById('gameTableBody');
  tbody.innerHTML = '';
  let filtered = allGames.filter(g => !g.excluded && g.score > 0);
  if (currentFilter !== 'all') filtered = filtered.filter(g => g.priority === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(g => {
      return (g.name||'').toLowerCase().includes(q) ||
        (g.snapshot?.developers||[]).join(' ').toLowerCase().includes(q) ||
        (g.snapshot?.genres||[]).join(' ').toLowerCase().includes(q);
    });
  }
  filtered.sort((a,b) => {
    const k = currentSort.key;
    let va, vb;
    switch(k) {
      case 'priority': const o={'CRITICAL':0,'HIGH':1,'MEDIUM':2,'LOW':3}; va=o[a.priority]??9; vb=o[b.priority]??9; break;
      case 'name': va=(a.name||'').toLowerCase(); vb=(b.name||'').toLowerCase(); break;
      case 'score': va=a.score||0; vb=b.score||0; break;
      case 'pcu': va=a.snapshot?.pcu||0; vb=b.snapshot?.pcu||0; break;
      case 'twitch': va=a.snapshot?.twitch_viewers||0; vb=b.snapshot?.twitch_viewers||0; break;
      case 'review': va=a.snapshot?.review_score||0; vb=b.snapshot?.review_score||0; break;
      default: va=a.score||0; vb=b.score||0;
    }
    if (typeof va==='string') return currentSort.dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return currentSort.dir==='asc'?va-vb:vb-va;
  });

  filtered.forEach(game => {
    const s = game.snapshot||{};
    const pcu = s.pcu||0, twitch = s.twitch_viewers||0, review = s.review_score||0;
    const totalReviews = s.total_reviews||0, score = game.score||0;
    
    let barColor = '#34c759';
    if (score>=65) barColor='#ff3b30'; else if (score>=45) barColor='#ff9500'; else if (score>=25) barColor='#e6a700';
    
    const signalTags = (game.signals||[]).slice(0,3).map(sig =>
      `<span class="signal-tag">${sig.type.replace(/_/g,' ')}</span>`
    ).join('');
    
    const freshness = s.freshness||'';
    let freshClass = 'fresh-new';
    if (freshness.includes('首周')) freshClass='fresh-launch';
    else if (freshness.includes('新品')) freshClass='fresh-new';
    else if (freshness.includes('近期')) freshClass='fresh-recent';
    else if (freshness.includes('翻红')) freshClass='fresh-evergreen';
    else if (freshness.includes('即将')) freshClass='fresh-upcoming';
    
    const freshTag = freshness ? `<span class="freshness-tag ${freshClass}">${freshness}</span>` : '';
    const eaBadge = s.ea ? '<span class="ea-badge">EA</span>' : '';
    const devs = (s.developers||[]).join(', ') || '';
    
    const row = document.createElement('tr');
    row.style.cursor = 'pointer';
    row.onclick = () => toggleExpand(game, row);
    row.innerHTML = `
      <td><span class="priority-badge priority-${game.priority}">${game.priority}</span></td>
      <td>
        <div class="game-name">${game.name||'?'}${eaBadge}${freshTag}</div>
        <div class="game-dev">${devs}</div>
      </td>
      <td><div class="score-bar"><span style="font-weight:700;min-width:28px">${score}</span><div class="bar"><div class="bar-fill" style="width:${score}%;background:${barColor}"></div></div></div></td>
      <td style="font-weight:600;${pcu>=5000?'color:#ff9500;':''}">${pcu>0?pcu.toLocaleString():'-'}</td>
      <td style="font-weight:600;${twitch>=10000?'color:#af52de;':''}">${twitch>0?twitch.toLocaleString():'-'}</td>
      <td>${totalReviews>0?`<span style="color:${review>=85?'#34c759':review>=70?'#e6a700':'#ff3b30'}">${review.toFixed(0)}%</span><span style="color:#aeaeb2;font-size:11px"> (${totalReviews.toLocaleString()})</span>`:'-'}</td>
      <td style="color:var(--text-secondary)">${s.price||'N/A'}</td>
      <td><div class="signal-tags">${signalTags||'-'}</div></td>
    `;
    tbody.appendChild(row);
  });
  if (!filtered.length) {
    const row = document.createElement('tr');
    row.innerHTML = '<td colspan="8" style="text-align:center;color:var(--text-tertiary);padding:40px">暂无匹配结果</td>';
    tbody.appendChild(row);
  }
}

function toggleExpand(game, clickedRow) {
  const existing = document.querySelector('.expand-row');
  if (existing) { const was = existing.previousElementSibling===clickedRow; existing.remove(); if (was) return; }
  const s = game.snapshot||{};
  const signalHtml = (game.signals||[]).map(sig => `
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0">
      <span style="width:8px;height:8px;border-radius:50%;background:${
        sig.strength==='STRONG'?'#ff3b30':sig.strength==='MODERATE'?'#ff9500':'#e6a700'
      };flex-shrink:0"></span>
      <span style="flex:1;font-size:12px">${sig.description}</span>
      <span style="color:var(--text-tertiary);font-size:11px">w:${sig.weight}</span>
    </div>
  `).join('');
  const expandRow = document.createElement('tr');
  expandRow.className = 'expand-row';
  expandRow.innerHTML = `<td colspan="8"><div class="expand-content">
    <div class="signal-detail"><h4>信号详情</h4>${signalHtml||'<span style="color:var(--text-tertiary)">暂无</span>'}</div>
    <div class="signal-detail"><h4>游戏信息</h4><div style="font-size:12px;line-height:2">
      <div>品类: ${(s.genres||[]).join(', ')||'N/A'}</div>
      <div>发布: ${s.release_date||'N/A'} ${s.freshness||''}</div>
      <div>拥有者: ${s.owners_estimate||'N/A'}</div>
      <div>${game.appid?`<a href="https://store.steampowered.com/app/${game.appid}" target="_blank" style="color:var(--accent);text-decoration:none">Steam商店 ↗</a>`:'非Steam游戏'}</div>
    </div></div>
    <div class="action-text"><strong>行动建议</strong><br>${(game.action||'').replace(/\n/g,'<br>')}</div>
  </div></td>`;
  clickedRow.insertAdjacentElement('afterend', expandRow);
}

function filterGames(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function searchGames(q) { currentSearch = q; renderTable(); }

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (currentSort.key===key) currentSort.dir = currentSort.dir==='desc'?'asc':'desc';
    else currentSort = {key, dir:'desc'};
    document.querySelectorAll('th').forEach(h => h.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(currentSort.dir==='asc'?'sorted-asc':'sorted-desc');
    renderTable();
  });
});

renderCharts();
renderTable();
</script>
</body>
</html>
